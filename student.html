<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">CoreCampus</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <!-- Options -->
    <div class="container mt-5 w-50">
      <div
        class="btn-container d-flex justify-content-center align-items-center gap-5"
      >
        <button class="btn btn-primary text-nowrap" id="allStudents">
          All Students
        </button>
        <button
          class="btn btn-success text-nowrap"
          id="filterStudent"
          data-bs-toggle="modal"
          data-bs-target="#filterStudentModal"
        >
          Filter Student
        </button>

        <button
          class="btn btn-primary text-nowrap"
          data-bs-toggle="modal"
          data-bs-target="#addStudentModal"
        >
          + Add Students
        </button>
        <div class="serach d-flex align-items-center">
          <input type="text" class="form-control searchInput" />
          <button class="btn" id="searchButton">
            <i class="fa-solid fa-magnifying-glass fa-xl"></i>
          </button>
        </div>
      </div>
    </div>

    <!--Add student modal-->
    <div
      class="modal fade mt-5"
      id="addStudentModal"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="addStudentModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="addStudentModalLabel">Add Student</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mt-3">
              <label for="rollno" class="form-label"
                >Roll No <span class="required">*</span></label
              >
              <input type="text" class="form-control" id="rollno" />
            </div>

            <div class="mt-3">
              <label for="Name" class="form-label"
                >Enter the Student Name <span class="required">*</span>
              </label>
              <input type="text" class="form-control" id="name" />
            </div>

            <div class="mt-3">
              <label for="class" class="form-label"
                >Select class<span class="required">*</span></label
              >
              <select name="class" id="studentClass" class="form-control">
                <option value="None"></option>
                <option value="I">I</option>
                <option value="II">II</option>
                <option value="III">III</option>
                <option value="IV">IV</option>
                <option value="V">V</option>
              </select>
            </div>

            <div class="mt-3">
              <label for="section" class="form-label"
                >Select Section <span class="required">*</span></label
              >
              <select name="section" id="studentSection" class="form-control">
                <option value="None"></option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary" id="addStudent">
              + Add Student
            </button>
          </div>
        </div>
      </div>
    </div>

    <!--Filter student modal-->
    <div
      class="modal fade"
      id="filterStudentModal"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="filterStudentLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="filterStudentLabel">
              Filter Student
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <div class="mt-3 d-flex align-items-center gap-3">
              <label for="rollno" class="form-label fs-5">Roll No </label>
              <i class="fa-solid fa-arrow-up-1-9 fa-xl rollnoAsc"></i>
              <i class="fa-solid fa-arrow-up-9-1 fa-xl rollnoDesc"></i>
            </div>

            <div class="mt-3 d-flex align-items-center gap-3">
              <label for="namefilter" class="form-label fs-5">Name </label>
              <i class="fa-solid fa-arrow-up-a-z fa-xl nameAscending"></i>
              <i class="fa-solid fa-arrow-down-z-a fa-xl nameDescending"></i>
            </div>

            <div class="mt-3">
              <button
                class="btn btn-outline-primary dropdown-toggle"
                data-bs-toggle="dropdown"
              >
                Classes
              </button>
              <i class="fa-solid fa-arrow-up-1-9 fa-xl classAsc"></i>
              <i class="fa-solid fa-arrow-up-9-1 fa-xl classDesc"></i>
              <ul class="dropdown-menu p-3">
                <li>
                  <input
                    type="checkbox"
                    value="All"
                    class="class-filter"
                    checked
                    disabled
                  />All Classes
                </li>
                <li>
                  <input type="checkbox" value="I" class="class-filter" /> Class
                  1
                </li>
                <li>
                  <input type="checkbox" value="II" class="class-filter" />
                  Class 2
                </li>
                <li>
                  <input type="checkbox" value="II" class="class-filter" />
                  Class 3
                </li>
                <li>
                  <input type="checkbox" value="IV" class="class-filter" />
                  Class 4
                </li>
                <li>
                  <input type="checkbox" value="V" class="class-filter" /> Class
                  5
                </li>
              </ul>
            </div>

            <div class="mt-3">
              <button
                class="btn btn-outline-info dropdown-toggle"
                data-bs-toggle="dropdown"
              >
                Section
              </button>
              <i class="fa-solid fa-arrow-up-1-9 fa-xl sectionAsc"></i>
              <i class="fa-solid fa-arrow-up-9-1 fa-xl sectionDesc"></i>
              <ul class="dropdown-menu p-3">
                <li>
                  <input
                    type="checkbox"
                    value="All"
                    class="section-filter"
                    disabled
                    checked
                  />All Sections
                </li>
                <li>
                  <input type="checkbox" value="A" class="section-filter" />A
                </li>
                <li>
                  <input type="checkbox" value="B" class="section-filter" />B
                </li>
                <li>
                  <input type="checkbox" value="C" class="section-filter" />C
                </li>
              </ul>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-success" id="filterButton">
              filter
            </button>
          </div>
        </div>
      </div>
    </div>

    <!--edit student modal-->
    <div
      class="modal fade"
      id="editStudent"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      tabindex="-1"
      aria-labelledby="editStudentLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="editStudentLabel">
              Edit Student
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">


            <div class="mt-3">
              <label for="rollno" class="form-label"
                >Roll No <span class="required">*</span></label
              >
              <input type="text" class="form-control" id="editRollno" />
            </div>

            <div class="mt-3">
              <label for="Name" class="form-label"
                >Enter the Student Name <span class="required">*</span>
              </label>
              <input type="text" class="form-control" id="editName" />
            </div>

            <div class="mt-3">
              <label for="class" class="form-label"
                >Select class<span class="required">*</span></label
              >
              <select name="class" id="editStudentClass" class="form-control">
                <option value="None"></option>
                <option value="I">I</option>
                <option value="II">II</option>
                <option value="III">III</option>
                <option value="IV">IV</option>
                <option value="V">V</option>
              </select>
            </div>

            <div class="mt-3">
              <label for="section" class="form-label"
                >Select Section <span class="required">*</span></label
              >
              <select name="section" id="editStudentSection" class="form-control">
                <option value="None"></option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-success saveBtn" >Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <!--search options-->

    <!--student display-->
    <table class="table container border w-50 mt-5"></table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
  </body>
</html>
