<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!--navbar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">CoreCampus</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </nav>

    <!--Options--> 
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-3">
          
          <!--student-->
          <div class="card bg-primary" style="width: 18rem;">
            <div class="card-body">
              <h3 class="fw-bold studentCount  text-light">0</h3>
              <p class="card-text fs-4 fw-medium text-light">Students</p>
            </div>
            <div class="card-footer student-footer ">
              <a href="student.html" class="text-decoration-none text-light">View More</a>
            </div>
          </div>

          </div>

        <div class="col-3">
          <!--Teacher-->
          <div class="card bg-success" style="width: 18rem;">
            <div class="card-body">
              <h3 class="fw-bold techerCount  text-light">0</h3>
              <p class="card-text fs-4 fw-medium text-light">Teachers</p>
            </div>
            <div class="card-footer text-light opacity-0">
              <a href="teacher.html" class="text-decoration-none text-light">View More</a>
            </div>
          </div>
        </div>

        <div class="col-3">
          <!--Class Room--> 
          <div class="card bg-info" style="width: 18rem;">
            <div class="card-body">
              <h3 class="fw-bold classCount  text-light">0</h3>
              <p class="card-text fs-4 fw-medium text-light">Class Room</p>
            </div>
            <div class="card-footer text-light">
              <a href="classroom.html" class="text-decoration-none text-light">View More</a>
            </div>
          </div>
        </div>
        </div>
      </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
